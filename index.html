<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; script-src 'unsafe-inline'; img-src 'self' data:">
    <title>Peak — Shared Workout</title>

    <!-- Open Graph (static — crawlers don't execute JS) -->
    <meta property="og:title" content="Peak — Shared Workout">
    <meta property="og:description" content="Tap to open this workout in Peak">
    <meta property="og:image" content="https://train-with-peak.github.io/peak-share/og-image.png">
    <meta property="og:type" content="website">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
            -webkit-font-smoothing: antialiased;
        }
        .card {
            max-width: 420px;
            width: 100%;
            background: rgba(255,255,255,0.06);
            border: 0.5px solid rgba(255,255,255,0.08);
            border-radius: 20px;
            padding: 32px 24px;
            text-align: center;
        }
        .logo {
            width: 56px;
            height: 56px;
            margin: 0 auto 20px;
            border-radius: 14px;
        }
        .workout-name {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 8px;
            word-break: break-word;
        }
        .exercise-count {
            font-size: 14px;
            color: rgba(255,255,255,0.48);
            margin-bottom: 24px;
        }
        .exercise-list {
            list-style: none;
            text-align: left;
            margin-bottom: 28px;
        }
        .exercise-list li {
            padding: 10px 14px;
            background: rgba(255,255,255,0.04);
            border-radius: 10px;
            margin-bottom: 8px;
            font-size: 15px;
            font-weight: 500;
            color: rgba(255,255,255,0.72);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .exercise-list li .sets {
            font-size: 13px;
            color: rgba(255,255,255,0.36);
            white-space: nowrap;
            margin-left: 12px;
        }
        .open-btn {
            display: inline-block;
            background: #fff;
            color: #000;
            font-size: 16px;
            font-weight: 600;
            padding: 14px 32px;
            border-radius: 999px;
            text-decoration: none;
            cursor: pointer;
            border: none;
            transition: opacity 0.15s;
        }
        .open-btn:hover { opacity: 0.85; }
        .fallback {
            margin-top: 16px;
            font-size: 13px;
            color: rgba(255,255,255,0.36);
        }
        .fallback a {
            color: rgba(255,255,255,0.56);
            text-decoration: underline;
        }
        .error-msg {
            font-size: 15px;
            color: rgba(255,255,255,0.48);
            padding: 40px 0;
        }
    </style>
</head>
<body>
    <div class="card" id="card">
        <noscript>
            <p class="error-msg">Please enable JavaScript to view this shared workout.</p>
        </noscript>
    </div>

    <script>
        (function() {
            'use strict';

            var MAX_PAYLOAD = 10000;
            var card = document.getElementById('card');

            // Read ?d= parameter
            var params = new URLSearchParams(window.location.search);
            var encoded = params.get('d');

            if (!encoded || encoded.length > MAX_PAYLOAD) {
                showError('Invalid or missing workout data.');
                return;
            }

            // Decode URL-safe Base64
            var base64 = encoded.replace(/-/g, '+').replace(/_/g, '/');
            var pad = base64.length % 4;
            if (pad > 0) base64 += '===='.substring(pad);

            var json;
            try {
                json = JSON.parse(atob(base64));
            } catch (e) {
                showError('Could not decode workout data.');
                return;
            }

            // Validate schema
            if (typeof json.version !== 'number' || json.version < 1 ||
                typeof json.name !== 'string' || json.name.length === 0 ||
                !Array.isArray(json.exercises)) {
                showError('Invalid workout format.');
                return;
            }

            // S2: Guard against oversized exercise arrays
            if (json.exercises.length > 20) {
                showError('Workout has too many exercises.');
                return;
            }

            // Build UI safely (textContent only, no innerHTML with user data)
            card.textContent = ''; // clear noscript

            // Logo

            logo.className = 'logo';
            logo.src = 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAHAAAABwCAYAAADG4PRLAAAMZ0lEQVR42u2ce3AWZZbGn7e/zpePSAK5AYHclBQg6EaKDQ5juF+L2QWmmDABSoUZhrUoYFcLLS5iZsctGEUwDOUgV5eoQa7LzQGnIAGktkgyDAOCDhAMQUhIDH5AyK0v59k/0h8Vd9XVETVk3t9fqa7+qtJ93ue8/ZxzugGNRqPRaDQajUaj0Wg0Go1Go9FoNBqNRqPRaDQajUaj0Wg0Go1Go9FovhSSiqTSd0Kj+b6VBwBrVqxJePvtt+O8w21SiUZbvKjDhw/7AKBXv17TUlNTxwFAYWGhTy/te0eBBgB8XPbxsUuXLm32jplt8VrNtpg+lVLSv3//qI4dOvZ1HKcrANPn8zl6ad8DbN261QcAeXl5I0WE9fV17u+W/y69pTI1rVuBJgCcOHHiFXocPXr4mbaaRtviinQBqLi4uBGhA50Tuo32/hS9xFsxOTk5BgDMz5mfdvPmTYukkGRNTU1tVlZWl5YWQ9MKKSwsNAFg//59/+JlT4ukTZJ79+79WctzNK1z//MBwAdnzuwkSdd1bZeuRVJOnjy5vi3ug21pD1SGYbg9e/aMjImOfswLqQGB4e2JwwCEG4bhtNWqTJuwD7m5ucNt2yJJx3VdcV1HSLoNjQ3Mzc3NaHmuphXah8LCwt+G9j+XrpCueHshjxw5slgp1abSqNHG7IMRFxc3GgBccY3QxbmuawBA586dx5DUdqK12ocJEyb0qKqqskmK67rSbCPupFGpqalpmDJlSkrL32gFtgKGDBliAFDjxo0b2qlTJxOAaxgGRAQihGEoAHBiY2MDEyZOGAZAeb/RtKbuQ0FBwe6QfRARekZePEXaJFnyp5LtLS2HVmDrsA8CoGPXrl0fAwBxXUMpxePHj6OoqOhz+2BcbNygmJiYKMMwXG0nWpF9mDVr1pj6+nqSdGzbJkmZOHGiZGdnC0mxLEtIOpZl8eWXXx6j7UQrsw+bNm1a6aVPi6SUXbrEyKgO0qlTZ7lWdU1IiuM6FkkePHhwZVupyhhtxD74UlJShgOA7dgGAKxdu5a1tbdQXV2NN/PebD7RaU6jCQkJo9HczHa1BFqBfejVq9dDZWVlTsg+fPbZZ0xKSpb72kdKeKCd9O7TR+rr60PWwg0Gg/LUU0/1bUt2Avdy9+GZZ5751+anzub0ueLVVwlAYmJjJTomRgAl27ZvF5Jie3W2bdu2LWzLszL3lH3Iy8v7g1c+s+vq6qRnz14SHggwOiZGYmJixefzyahRo0IBtEmyqKjoqB6z+IH3b6O5WBZz7NixoBdAd9OmPAHA2Lg48YcHpF27COkYHU1/eLgUlxQLSZeklJeX1/fp0ydJp9EfwvgpdeemDxo0aNz169dJ0rYsSzL695fwQIB+fzgzMwdKenq6tIu4T5RS8ssZM0LG3nJdlzk5OdMA6PH7H2Tqes2aCAB4/vnn14a6D7t27RKllHTo2JHt27dnefllKSgoEKUUozp0YGxcnFz+5LKEuvRbtmzZoZTCypUrowCY92IgjXvNtCuluGrVquyuXbv2A4DuaWmjSUJEjOUrVsAfHsDNGzewZOlSJicnYejQoZg2fRpra2t5veY68jbl3bnuxOTkISQD8R3iU5e/+uospRS1uf8OMydJY9y4cZF/PPjHc2fOnOkSFhb2yPGi4yTp7t23T3ymKT6fKWPH/oSh6ovrunKt6pokJiaJzzTlwd695fbt20LSDgaDHDv2n8eQNA8cOHB+zZo13UkqvSd+h/MuxX8qfuno+0cbAWDs2H/6TV1dPUlagwcPFihD4uM7SVlZmYgIHccRy7aEpORv3izKMMRnmvLOO++EmrzyyiuvrAaAvXv3nj39dendbanQ3aoMO0n106lTE2tra5tef/31vyil8Nxzz50gyQ0bNtjNBW0lGzZsCN             logo.alt = 'Peak';
            card.appendChild(logo);

            // Workout name
            var nameEl = document.createElement('div');
            nameEl.className = 'workout-name';
            nameEl.textContent = json.name;
            card.appendChild(nameEl);

            // Exercise count
            var countEl = document.createElement('div');
            countEl.className = 'exercise-count';
            countEl.textContent = json.exercises.length + ' exercise' + (json.exercises.length !== 1 ? 's' : '');
            card.appendChild(countEl);

            // Exercise list (max 20)
            var list = document.createElement('ul');
            list.className = 'exercise-list';
            var exercises = json.exercises.slice(0, 20);
            for (var i = 0; i < exercises.length; i++) {
                var ex = exercises[i];
                var li = document.createElement('li');

                // S5: Validate exercise name type
                var nameSpan = document.createElement('span');
                nameSpan.textContent = (typeof ex.name === 'string' && ex.name.length > 0) ? ex.name : 'Unknown';
                li.appendChild(nameSpan);

                // S5: Validate sets type
                if (typeof ex.sets === 'number' && ex.sets > 0 && ex.sets <= 100) {
                    var setsSpan = document.createElement('span');
                    setsSpan.className = 'sets';
                    setsSpan.textContent = ex.sets + ' set' + (ex.sets !== 1 ? 's' : '');
                    li.appendChild(setsSpan);
                }

                list.appendChild(li);
            }
            if (json.exercises.length > 20) {
                var moreLi = document.createElement('li');
                moreLi.textContent = '+ ' + (json.exercises.length - 20) + ' more';
                list.appendChild(moreLi);
            }
            card.appendChild(list);

            // Open in Peak button
            var deepLink = 'peak://import-workout?d=' + encoded;
            var fallbackShown = false;
            var btn = document.createElement('button');
            btn.className = 'open-btn';
            btn.textContent = 'Open in Peak';
            btn.addEventListener('click', function() {
                window.location.href = deepLink;

                // Fallback to App Store after 1.5s (only once)
                if (fallbackShown) return;
                fallbackShown = true;
                setTimeout(function() {
                    var fallbackDiv = document.createElement('div');
                    fallbackDiv.className = 'fallback';

                    var text = document.createTextNode("Don't have Peak? ");
                    fallbackDiv.appendChild(text);

                    var link = document.createElement('a');
                    link.href = 'https://apps.apple.com/app/peak/id6746268490';
                    link.textContent = 'Get it on the App Store';
                    fallbackDiv.appendChild(link);

                    card.appendChild(fallbackDiv);
                }, 1500);
            });
            card.appendChild(btn);

            function showError(msg) {
                card.textContent = '';
                var p = document.createElement('p');
                p.className = 'error-msg';
                p.textContent = msg;
                card.appendChild(p);
            }
        })();
    </script>
</body>
</html>
