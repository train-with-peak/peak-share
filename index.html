<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; script-src 'unsafe-inline'; img-src 'self' data:">
    <title>Peak — Shared Workout</title>

    <!-- Open Graph (static — crawlers don't execute JS) -->
    <meta property="og:title" content="Peak — Shared Workout">
    <meta property="og:description" content="Tap to open this workout in Peak">
    <meta property="og:image" content="https://train-with-peak.github.io/peak-share/og-image-1200x630.png?v=2">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:image:alt" content="Peak shared workout">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:image" content="https://train-with-peak.github.io/peak-share/og-image-1200x630.png?v=2">
    <meta property="og:type" content="website">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
            -webkit-font-smoothing: antialiased;
            position: relative;
            overflow-x: hidden;
        }
        body::before,
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }
        body::before {
            background:
                radial-gradient(520px 260px at 18% -8%, rgba(255,255,255,0.12), transparent 68%),
                radial-gradient(460px 240px at 88% 108%, rgba(255,255,255,0.08), transparent 70%);
        }
        body::after {
            background: radial-gradient(380px 180px at 50% 0%, rgba(255,255,255,0.06), transparent 74%);
            opacity: 0.72;
        }
        .card {
            max-width: 420px;
            width: 100%;
            background: rgba(255,255,255,0.065);
            border: 0.5px solid rgba(255,255,255,0.11);
            border-radius: 20px;
            padding: 32px 24px;
            text-align: center;
            box-shadow: 0 18px 42px rgba(0,0,0,0.36);
            position: relative;
            z-index: 1;
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 0.24s ease, transform 0.3s cubic-bezier(0.22, 1, 0.36, 1), border-color 0.2s ease;
        }
        .card.is-ready {
            opacity: 1;
            transform: translateY(0);
        }
        .header-block {
            margin-bottom: 20px;
        }
        .logo {
            display: block;
            width: min(164px, 56vw);
            max-width: 190px;
            max-height: 84px;
            height: auto;
            object-fit: contain;
            margin: 0 auto 14px;
        }
        .utility-badge {
            display: inline-block;
            margin-bottom: 12px;
            padding: 5px 10px;
            border-radius: 999px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.86);
            background: rgba(255,255,255,0.1);
            border: 0.5px solid rgba(255,255,255,0.14);
        }
        .hero-intro {
            font-size: 18px;
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 6px;
            color: rgba(255,255,255,0.97);
        }
        .hero-subtext {
            font-size: 14px;
            line-height: 1.35;
            margin-bottom: 14px;
            color: rgba(255,255,255,0.6);
        }
        .workout-name {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 8px;
            word-break: break-word;
        }
        .exercise-count {
            font-size: 14px;
            color: rgba(255,255,255,0.48);
        }
        .list-block {
            margin-bottom: 20px;
        }
        .exercise-list {
            list-style: none;
            text-align: left;
            margin-bottom: 0;
        }
        .exercise-list li {
            padding: 10px 14px;
            background: rgba(255,255,255,0.04);
            border-radius: 10px;
            margin-bottom: 8px;
            font-size: 15px;
            font-weight: 500;
            color: rgba(255,255,255,0.72);
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background-color 0.2s ease, transform 0.2s ease;
        }
        .exercise-list li:last-child { margin-bottom: 0; }
        .exercise-list li .sets {
            font-size: 13px;
            color: rgba(255,255,255,0.36);
            white-space: nowrap;
            margin-left: 12px;
        }
        .cta-block { margin-top: 2px; }
        .open-btn {
            display: inline-block;
            background: #fff;
            color: #000;
            font-size: 16px;
            font-weight: 600;
            padding: 14px 32px;
            border-radius: 999px;
            text-decoration: none;
            cursor: pointer;
            border: none;
            transition: transform 0.16s ease, opacity 0.16s ease, box-shadow 0.2s ease;
            box-shadow: 0 8px 20px rgba(255,255,255,0.16);
            min-width: 190px;
        }
        .open-btn:hover { opacity: 0.92; transform: translateY(-1px); }
        .open-btn:active,
        .open-btn.is-pressed { transform: translateY(0) scale(0.98); }
        .open-btn:focus-visible {
            outline: none;
            box-shadow: 0 0 0 2px rgba(255,255,255,0.24), 0 8px 20px rgba(255,255,255,0.16);
        }
        .fallback {
            margin-top: 12px;
            font-size: 13px;
            line-height: 1.35;
            color: rgba(255,255,255,0.46);
        }
        .fallback a {
            color: rgba(255,255,255,0.68);
            text-decoration: underline;
            text-underline-offset: 2px;
        }
        .error-msg {
            font-size: 15px;
            color: rgba(255,255,255,0.48);
            padding: 40px 0;
        }
        @media (hover: hover) {
            .exercise-list li:hover {
                background: rgba(255,255,255,0.075);
                transform: translateX(2px);
            }
        }
        @media (prefers-reduced-motion: reduce) {
            .card {
                opacity: 1;
                transform: none;
                transition: none;
            }
            .open-btn, .exercise-list li { transition: none; }
            .open-btn:hover { transform: none; }
        }
    </style>
</head>
<body>
    <div class="card" id="card">
        <noscript>
            <p class="error-msg">Please enable JavaScript to view this shared workout.</p>
        </noscript>
    </div>

    <script>
        (function() {
            'use strict';

            var MAX_PAYLOAD = 10000;
            var card = document.getElementById('card');

            // Read ?d= parameter
            var params = new URLSearchParams(window.location.search);
            var encoded = params.get('d');

            if (!encoded || encoded.length > MAX_PAYLOAD) {
                showError('Invalid or missing workout data.');
                return;
            }

            // Decode URL-safe Base64
            var base64 = encoded.replace(/-/g, '+').replace(/_/g, '/');
            var pad = base64.length % 4;
            if (pad > 0) base64 += '===='.substring(pad);

            var json;
            try {
                json = JSON.parse(atob(base64));
            } catch (e) {
                showError('Could not decode workout data.');
                return;
            }

            // Validate schema
            if (typeof json.version !== 'number' || json.version < 1 ||
                typeof json.name !== 'string' || json.name.length === 0 ||
                !Array.isArray(json.exercises)) {
                showError('Invalid workout format.');
                return;
            }

            // S2: Guard against oversized exercise arrays
            if (json.exercises.length > 20) {
                showError('Workout has too many exercises.');
                return;
            }

            // Build UI safely (textContent only, no innerHTML with user data)
            card.textContent = ''; // clear noscript

            // Header block
            var header = document.createElement('div');
            header.className = 'header-block';

            // Logo
            var logo = document.createElement('img');
            logo.className = 'logo';
            logo.src = 'logo.png?v=2';
            logo.alt = 'Peak';
            logo.decoding = 'async';
            logo.loading = 'eager';
            logo.addEventListener('error', function() { logo.remove(); });
            header.appendChild(logo);

            var badge = document.createElement('div');
            badge.className = 'utility-badge';
            badge.textContent = 'Ready in 1 tap';
            header.appendChild(badge);

            var intro = document.createElement('div');
            intro.className = 'hero-intro';
            intro.textContent = 'Someone shared a workout with you';
            header.appendChild(intro);

            var sub = document.createElement('div');
            sub.className = 'hero-subtext';
            sub.textContent = 'Open it in Peak and start training.';
            header.appendChild(sub);

            // Workout name
            var nameEl = document.createElement('div');
            nameEl.className = 'workout-name';
            nameEl.textContent = json.name;
            header.appendChild(nameEl);

            // Exercise count
            var countEl = document.createElement('div');
            countEl.className = 'exercise-count';
            countEl.textContent = json.exercises.length + ' exercise' + (json.exercises.length !== 1 ? 's' : '');
            header.appendChild(countEl);

            card.appendChild(header);

            // Exercise list (max 20)
            var listBlock = document.createElement('div');
            listBlock.className = 'list-block';

            var list = document.createElement('ul');
            list.className = 'exercise-list';
            var exercises = json.exercises.slice(0, 20);
            for (var i = 0; i < exercises.length; i++) {
                var ex = exercises[i];
                var li = document.createElement('li');

                // S5: Validate exercise name type
                var nameSpan = document.createElement('span');
                nameSpan.textContent = (typeof ex.name === 'string' && ex.name.length > 0) ? ex.name : 'Unknown';
                li.appendChild(nameSpan);

                // S5: Validate sets type
                if (typeof ex.sets === 'number' && ex.sets > 0 && ex.sets <= 100) {
                    var setsSpan = document.createElement('span');
                    setsSpan.className = 'sets';
                    setsSpan.textContent = ex.sets + ' set' + (ex.sets !== 1 ? 's' : '');
                    li.appendChild(setsSpan);
                }

                list.appendChild(li);
            }
            if (json.exercises.length > 20) {
                var moreLi = document.createElement('li');
                moreLi.textContent = '+ ' + (json.exercises.length - 20) + ' more';
                list.appendChild(moreLi);
            }
            listBlock.appendChild(list);
            card.appendChild(listBlock);

            // CTA block
            var ctaBlock = document.createElement('div');
            ctaBlock.className = 'cta-block';

            var deepLink = 'peak://import-workout?d=' + encoded;
            var appStoreURL = 'https://apps.apple.com/app/peak/id6746268490';
            var wasBackgrounded = false;

            document.addEventListener('visibilitychange', function() {
                if (document.hidden) wasBackgrounded = true;
            });

            var btn = document.createElement('button');
            btn.className = 'open-btn';
            btn.textContent = 'Open in Peak';
            btn.addEventListener('click', function() {
                btn.classList.add('is-pressed');
                setTimeout(function() { btn.classList.remove('is-pressed'); }, 140);
                window.location.href = deepLink;

                // Fallback to App Store when app is not installed.
                setTimeout(function() {
                    if (!wasBackgrounded) window.location.href = appStoreURL;
                }, 1200);
            });
            ctaBlock.appendChild(btn);

            var fallbackDiv = document.createElement('div');
            fallbackDiv.className = 'fallback';
            var text = document.createTextNode("Don't have Peak yet? ");
            fallbackDiv.appendChild(text);
            var link = document.createElement('a');
            link.href = appStoreURL;
            link.textContent = 'Get it on the App Store';
            fallbackDiv.appendChild(link);
            ctaBlock.appendChild(fallbackDiv);

            card.appendChild(ctaBlock);

            // Subtle entrance after content is ready.
            requestAnimationFrame(function() { card.classList.add('is-ready'); });

            function showError(msg) {
                card.textContent = '';
                var p = document.createElement('p');
                p.className = 'error-msg';
                p.textContent = msg;
                card.appendChild(p);
            }
        })();
    </script>
</body>
</html>
